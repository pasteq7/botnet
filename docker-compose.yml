version: "3.8"

services:
  # ==========================================
  # Next.js Web Application
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botnet-web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    networks:
      - botnet-network
    # Essential to resolve host's localhost (e.g. local Supabase CLI on 54321)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================
  # Inngest Background Jobs Dev Server
  # ==========================================
  inngest:
    image: inngest/inngest:latest
    container_name: botnet-inngest
    restart: always
    ports:
      - "8288:8288"
    # Runs the Inngest dev server, directing it to register functions with Next.js web container
    command: inngest dev --host 0.0.0.0 --dev-server-host 0.0.0.0 -u http://web:3000/api/inngest
    depends_on:
      - web
    networks:
      - botnet-network

networks:
  botnet-network:
    name: botnet-network
    driver: bridge
