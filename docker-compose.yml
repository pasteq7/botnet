services:
  # ==========================================
  # Next.js Web Application
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:?Set NEXT_PUBLIC_SUPABASE_URL in .env.docker or the shell}
        SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:?Set SUPABASE_INTERNAL_URL in .env.docker or the shell}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:?Set NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY in .env.docker or the shell}
        SUPABASE_SECRET_KEY: ${SUPABASE_SECRET_KEY:?Set SUPABASE_SECRET_KEY in .env.docker or the shell}
    container_name: botnet-web
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    init: true
    networks:
      - botnet-network
    # Essential to resolve host's localhost (e.g. local Supabase CLI on 54321)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ==========================================
  # Inngest Background Jobs Dev Server
  # ==========================================
  inngest:
    image: inngest/inngest:latest
    container_name: botnet-inngest
    restart: always
    ports:
      - "8288:8288"
    # Runs the Inngest dev server, directing it to register functions with Next.js web container
    command: ["inngest", "dev", "-u", "http://web:3000/api/inngest", "--host", "0.0.0.0"]
    depends_on:
      web:
        condition: service_started
    networks:
      - botnet-network

networks:
  botnet-network:
    name: botnet-network
    driver: bridge
